    function useTweaks(defaults) {
      const [values, setValues] = React.useState(defaults);
      const setTweak = React.useCallback((keyOrEdits, val) => {
        const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
          ? keyOrEdits : { [keyOrEdits]: val };
        setValues((prev) => ({ ...prev, ...edits }));
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
      }, []);
      return [values, setTweak];
    }

    function TweaksPanel({ title = 'Tweaks', children }) {
      const [open, setOpen] = React.useState(false);
      const dragRef = React.useRef(null);
      const offsetRef = React.useRef({ x: 16, y: 16 });
      const PAD = 16;

      const clampToViewport = React.useCallback(() => {
        const panel = dragRef.current;
        if (!panel) return;
        const w = panel.offsetWidth, h = panel.offsetHeight;
        const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
        const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
        offsetRef.current = {
          x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
          y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
        };
        panel.style.right = offsetRef.current.x + 'px';
        panel.style.bottom = offsetRef.current.y + 'px';
      }, []);

      React.useEffect(() => {
        if (!open) return;
        clampToViewport();
        if (typeof ResizeObserver === 'undefined') {
          window.addEventListener('resize', clampToViewport);
          return () => window.removeEventListener('resize', clampToViewport);
        }
        const ro = new ResizeObserver(clampToViewport);
        ro.observe(document.documentElement);
        return () => ro.disconnect();
      }, [open, clampToViewport]);

      React.useEffect(() => {
        const onMsg = (e) => {
          const t = e?.data?.type;
          if (t === '__activate_edit_mode') setOpen(true);
          else if (t === '__deactivate_edit_mode') setOpen(false);
        };
        window.addEventListener('message', onMsg);
        window.parent.postMessage({ type: '__edit_mode_available' }, '*');
        return () => window.removeEventListener('message', onMsg);
      }, []);

      const dismiss = () => {
        setOpen(false);
        window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
      };

      const onDragStart = (e) => {
        const panel = dragRef.current;
        if (!panel) return;
        const r = panel.getBoundingClientRect();
        const sx = e.clientX, sy = e.clientY;
        const startRight = window.innerWidth - r.right;
        const startBottom = window.innerHeight - r.bottom;
        const move = (ev) => {
          offsetRef.current = {
            x: startRight - (ev.clientX - sx),
            y: startBottom - (ev.clientY - sy),
          };
          clampToViewport();
        };
        const up = () => {
          window.removeEventListener('mousemove', move);
          window.removeEventListener('mouseup', up);
        };
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', up);
      };

      if (!open) return null;
      return (
        <>
          <style>{__TWEAKS_STYLE}</style>
          <div ref={dragRef} className="twk-panel" data-noncommentable=""
            style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
            <div className="twk-hd" onMouseDown={onDragStart}>
              <b>{title}</b>
              <button className="twk-x" aria-label="Close tweaks"
                onMouseDown={(e) => e.stopPropagation()}
                onClick={dismiss}>✕</button>
            </div>
            <div className="twk-body">{children}</div>
          </div>
        </>
      );
    }

    function TweakSection({ label, children }) {
      return (
        <>
          <div className="twk-sect">{label}</div>
          {children}
        </>
      );
    }

    function TweakRow({ label, value, children, inline = false }) {
      return (
        <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
          <div className="twk-lbl">
            <span>{label}</span>
            {value != null && <span className="twk-val">{value}</span>}
          </div>
          {children}
        </div>
      );
    }

    function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
      return (
        <TweakRow label={label} value={`${value}${unit}`}>
          <input type="range" className="twk-slider" min={min} max={max} step={step}
            value={value} onChange={(e) => onChange(Number(e.target.value))} />
        </TweakRow>
      );
    }

    function TweakToggle({ label, value, onChange }) {
      return (
        <div className="twk-row twk-row-h">
          <div className="twk-lbl"><span>{label}</span></div>
          <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
            role="switch" aria-checked={!!value}
            onClick={() => onChange(!value)}><i /></button>
        </div>
      );
    }

    function TweakRadio({ label, value, options, onChange }) {
      const trackRef = React.useRef(null);
      const [dragging, setDragging] = React.useState(false);
      const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
      const idx = Math.max(0, opts.findIndex((o) => o.value === value));
      const n = opts.length;

      const valueRef = React.useRef(value);
      valueRef.current = value;

      const segAt = (clientX) => {
        const r = trackRef.current.getBoundingClientRect();
        const inner = r.width - 4;
        const i = Math.floor(((clientX - r.left - 2) / inner) * n);
        return opts[Math.max(0, Math.min(n - 1, i))].value;
      };

      const onPointerDown = (e) => {
        setDragging(true);
        const v0 = segAt(e.clientX);
        if (v0 !== valueRef.current) onChange(v0);
        const move = (ev) => {
          if (!trackRef.current) return;
          const v = segAt(ev.clientX);
          if (v !== valueRef.current) onChange(v);
        };
        const up = () => {
          setDragging(false);
          window.removeEventListener('pointermove', move);
          window.removeEventListener('pointerup', up);
        };
        window.addEventListener('pointermove', move);
        window.addEventListener('pointerup', up);
      };

      return (
        <TweakRow label={label}>
          <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
            className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
            <div className="twk-seg-thumb"
              style={{
                left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                width: `calc((100% - 4px) / ${n})`
              }} />
            {opts.map((o) => (
              <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
                {o.label}
              </button>
            ))}
          </div>
        </TweakRow>
      );
    }

    function TweakSelect({ label, value, options, onChange }) {
      return (
        <TweakRow label={label}>
          <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
            {options.map((o) => {
              const v = typeof o === 'object' ? o.value : o;
              const l = typeof o === 'object' ? o.label : o;
              return <option key={v} value={v}>{l}</option>;
            })}
          </select>
        </TweakRow>
      );
    }

    function TweakText({ label, value, placeholder, onChange }) {
      return (
        <TweakRow label={label}>
          <input className="twk-field" type="text" value={value} placeholder={placeholder}
            onChange={(e) => onChange(e.target.value)} />
        </TweakRow>
      );
    }

    function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
      const clamp = (n) => {
        if (min != null && n < min) return min;
        if (max != null && n > max) return max;
        return n;
      };
      const startRef = React.useRef({ x: 0, val: 0 });
      const onScrubStart = (e) => {
        e.preventDefault();
        startRef.current = { x: e.clientX, val: value };
        const decimals = (String(step).split('.')[1] || '').length;
        const move = (ev) => {
          const dx = ev.clientX - startRef.current.x;
          const raw = startRef.current.val + dx * step;
          const snapped = Math.round(raw / step) * step;
          onChange(clamp(Number(snapped.toFixed(decimals))));
        };
        const up = () => {
          window.removeEventListener('pointermove', move);
          window.removeEventListener('pointerup', up);
        };
        window.addEventListener('pointermove', move);
        window.addEventListener('pointerup', up);
      };
      return (
        <div className="twk-num">

                <div style={{ display: 'flex', gap: '8px' }}>
                  <button onClick={prev} disabled={idx === 0} style={arrowBtn(idx === 0)}>←</button>

          </div>

        </section>

    }

    /* ─── TESTIMONIALS ────────────────────────────────────────────── */
    function Testimonials() {
      const trackMouse = (e) => {
        const rect = e.currentTarget.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width * 100).toFixed(1);
        const y = ((e.clientY - rect.top) / rect.height * 100).toFixed(1);
        e.currentTarget.style.setProperty('--mx', x + '%');
        e.currentTarget.style.setProperty('--my', y + '%');
      };

      return (
        <section style={{ padding: '120px 0 80px', borderTop: '1px solid var(--line)' }}>
          <div className="container" style={{ marginBottom: '56px' }}>
            <span className="num-mono" style={{ color: 'var(--muted)' }}>/testimonials</span>
            <h2 className="reveal" style={{
              fontSize: 'clamp(2.2rem, 5vw, 4rem)',
              fontWeight: 500, letterSpacing: '-0.04em', lineHeight: 0.95,

          </div>

          <div style={{
            display: 'grid',
            gridTemplateColumns: 'repeat(auto-fill, minmax(min(100%, 380px), 1fr))',
            gap: '1px',

            borderTop: '1px solid var(--line)',
            borderBottom: '1px solid var(--line)',

            {DATA.testimonials.map((t, i) => (
              <div key={i} className="reveal gl-testi" onMouseMove={trackMouse}
                style={{
                  background: 'var(--gm-bg)',
                  padding: '36px 32px',
                  display: 'flex', flexDirection: 'column', gap: '24px',
                  minHeight: '280px'
                }}>
                <span style={{ fontSize: '40px', color: 'var(--accent)', fontFamily: 'var(--serif)', lineHeight: 0.6, fontStyle: 'italic' }}>"</span>
                <p style={{
                  flex: 1, fontSize: '15px', lineHeight: 1.55,
                  color: 'var(--text)', letterSpacing: '-0.01em'
                }}>{t.text}</p>
                <div style={{ borderTop: '1px solid var(--line)', paddingTop: '14px' }}>
                  <div style={{ fontSize: '14px', fontWeight: 500, letterSpacing: '-0.01em' }}>{t.name}</div>
                  <div className="num-mono" style={{ color: 'var(--muted)', marginTop: '2px' }}>{t.role}</div>

                  conoce más →

              <div>
                <p className="reveal" style={{
                  fontSize: 'clamp(1.2rem, 1.9vw, 1.6rem)',

                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: '8px' }}>
                    {DATA.skills.map(s => (
                      <span key={s} className="gl-tag" style={{
                        fontSize: '13px', padding: '6px 12px',

                      }}>{s}</span>
                    ))}
                  </div>
                </div>

                <div className="reveal">
                  <div className="num-mono" style={{ color: 'var(--muted)', marginBottom: '12px' }}>/elsewhere</div>
                  {DATA.links.map((l, i) => (

                      <span style={{ display: 'flex', alignItems: 'baseline', gap: '12px' }}>

                      <span style={{ fontSize: '14px' }}>↗</span>

              </div>
            </div>
          </div>
        </section>
      );
    }

    /* ─── CONNECT ─────────────────────────────────────────────────── */
    function ConnectBlock() {
      return (

          <div className="container" style={{ textAlign: 'center' }}>

            <h2 className="reveal cursor-blink" style={{
              fontSize: 'clamp(2.4rem, 8vw, 7.5rem)',

              marginBottom: '40px'
            }}>
              ¿hablamos<span className="slash">?</span>
            </h2>
            <a href={`mailto:${DATA.email}`} className="gl-cta" style={{
              display: 'inline-block',
              fontSize: 'clamp(1.4rem, 3vw, 2.4rem)',
              fontStyle: 'italic', fontFamily: 'var(--serif)', fontWeight: 400,
              color: 'var(--accent)',

              borderRadius: '999px',
              textDecoration: 'none'

              send an email →
            </a>
            <div style={{
              marginTop: '48px', display: 'flex', gap: '16px', justifyContent: 'center', flexWrap: 'wrap',
              fontSize: '14px'
            }}>
              <a href={DATA.linkedin} target="_blank" rel="noopener" className="gl-tag hover-line"
                style={{ padding: '8px 16px', borderRadius: '999px', textDecoration: 'none' }}>
                linkedin <span style={{ fontSize: '10px' }}>↗</span>
              </a>
              <a href={`mailto:${DATA.email}`} className="gl-tag hover-line"
                style={{ padding: '8px 16px', borderRadius: '999px', textDecoration: 'none' }}>
                email <span style={{ fontSize: '10px' }}>↗</span>
              </a>
            </div>
          </div>
        </section>

    /* ─── FOOTER ──────────────────────────────────────────────────── */
    function Footer() {
      const scrollTo = (id) => {
        const el = document.getElementById(id);
        if (el) window.scrollTo({ top: el.offsetTop - 32, behavior: 'smooth' });
      };

      return (
        <footer style={{ background: '#0E0E0E', color: '#F2EEE6', padding: '80px 32px 40px' }}>
          <div className="container" style={{ padding: 0 }}>

            {/* ── Top: brand + cols ── */}
            <div style={{
              display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start',
              flexWrap: 'wrap', gap: '48px',
              paddingBottom: '64px', borderBottom: '1px solid rgba(242,238,230,0.1)'
            }}>
              <div style={{ maxWidth: '340px' }}>
                <div style={{
                  fontSize: 'clamp(2.8rem, 6vw, 6rem)', fontWeight: 600,
                  letterSpacing: '-0.05em', lineHeight: 0.85, marginBottom: '20px'
                }}>
                  {DATA.brand}<span style={{ color: 'var(--accent)', fontWeight: 700 }}>/</span>{DATA.brandSlash}
                </div>
                <p style={{ color: 'rgba(242,238,230,0.45)', fontSize: '14px', lineHeight: 1.55, letterSpacing: '-0.01em' }}>
                  {DATA.role}.
                </p>
                <p style={{ color: 'rgba(242,238,230,0.3)', fontSize: '13px', marginTop: '8px', fontFamily: 'var(--mono)', letterSpacing: '0.03em' }}>
                  {DATA.location}
                </p>
              </div>

              <div style={{ display: 'flex', gap: '64px', flexWrap: 'wrap' }}>
                <div>
                  <div className="num-mono" style={{ color: 'rgba(242,238,230,0.35)', marginBottom: '20px' }}>/nav</div>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: '14px' }}>
                    {[
                      { id: 'services', label: 'experience' },
                      { id: 'work', label: 'work' },
                      { id: 'about', label: 'about' },
                    ].map(l => (
                      <button key={l.id} onClick={() => scrollTo(l.id)} style={{
                        background: 'none', border: 'none', cursor: 'pointer',
                        color: 'rgba(242,238,230,0.6)', fontSize: '14px',

                        onMouseLeave={e => e.currentTarget.style.color = 'rgba(242,238,230,0.6)'}>
                        <span style={{ color: 'var(--accent)', fontWeight: 700 }}>/</span>{l.label}
                      </button>
                    ))}

                </div>

                <div>
                  <div className="num-mono" style={{ color: 'rgba(242,238,230,0.35)', marginBottom: '20px' }}>/contact</div>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: '14px' }}>
                    <a href={`mailto:${DATA.email}`} style={{
                      fontSize: '14px', color: 'rgba(242,238,230,0.6)',
                      letterSpacing: '-0.01em', transition: 'color 0.2s'
                    }}
                      onMouseEnter={e => e.currentTarget.style.color = '#F2EEE6'}
                      onMouseLeave={e => e.currentTarget.style.color = 'rgba(242,238,230,0.6)'}>
                      {DATA.email}
                    </a>
                    <a href={DATA.linkedin} target="_blank" rel="noopener" style={{
                      fontSize: '14px', color: 'rgba(242,238,230,0.6)',
                      letterSpacing: '-0.01em', transition: 'color 0.2s',
                      display: 'inline-flex', alignItems: 'center', gap: '6px'
                    }}
                      onMouseEnter={e => e.currentTarget.style.color = '#F2EEE6'}
                      onMouseLeave={e => e.currentTarget.style.color = 'rgba(242,238,230,0.6)'}>
                      linkedin <span style={{ fontSize: '10px' }}>↗</span>
                    </a>
                  </div>
                </div>
              </div>
            </div>

            {/* ── Bottom: copyright ── */}
            <div style={{
              display: 'flex', justifyContent: 'space-between', alignItems: 'center',
              flexWrap: 'wrap', gap: '12px', paddingTop: '28px'
            }}>
              <div className="num-mono" style={{ color: 'rgba(242,238,230,0.3)' }}>
                © {DATA.year} {DATA.fullName} · all rights reserved.
              </div>
              <div className="num-mono" style={{ color: 'rgba(242,238,230,0.3)' }}>
                <span style={{ color: 'var(--accent)', fontWeight: 700 }}>/</span>vibe-coded with care.
              </div>
            </div>

          </div>
        </footer>
      );
    }

    Object.assign(window, {
      Nav, Hero, Marquee,
      Services, ServiceItem,
      Work, ProjectCard,
      Testimonials, About, ConnectBlock, Footer,
      BackgroundBlobs,
    });
  </script>

  <!-- App principal — debe ir al final, depende de todo lo anterior -->
  <script type="text/babel">

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accent": "#504FED",
      "mode": "light",
      "marqueeText": "available for freelance · disponible para colaboraciones · 2026"
    }/*EDITMODE-END*/;

    function MyTweaks({ tweaks, setTweak }) {
      return (
        <TweaksPanel title="Tweaks">
          <TweakSection label="Modo">
            <TweakRadio
              id="mode" label="Tema" value={tweaks.mode}
              options={[
                { value: 'light', label: 'Light' },
                { value: 'dark', label: 'Dark' },
              ]}
              onChange={v => setTweak('mode', v)}
            />
          </TweakSection>
          <TweakSection label="Color de marca">
            <TweakColor
              id="accent" label="Acento" value={tweaks.accent}
              options={['#504FED', '#E84A3F', '#0E8A5A', '#E0A82E', '#0E0E0E', '#7A5BD8']}
              onChange={v => setTweak('accent', v)}
            />
          </TweakSection>
          <TweakSection label="Marquee">
            <TweakText
              id="marqueeText" label="Texto" value={tweaks.marqueeText}
              onChange={v => setTweak('marqueeText', v)}
            />
          </TweakSection>
        </TweaksPanel>
      );
    }

    function App() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

      React.useEffect(() => {
        document.body.setAttribute('data-mode', tweaks.mode);
        document.documentElement.style.setProperty('--accent', tweaks.accent);
      }, [tweaks.mode, tweaks.accent]);

      React.useEffect(() => {
        const els = document.querySelectorAll('.reveal');
        const obs = new IntersectionObserver(entries => {
          entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
        }, { threshold: 0.12 });
        els.forEach(el => obs.observe(el));
        return () => obs.disconnect();
      });

      return (
        <>
          <BackgroundBlobs />
          <Nav />
          <Hero />
          <Marquee text={tweaks.marqueeText} />
          <Services />
          <Work />
          <Testimonials />
          <About />
          <ConnectBlock />
          <Footer />
          <MyTweaks tweaks={tweaks} setTweak={setTweak} />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
